name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-amd64
            runner: ubuntu-latest
          - arch: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build binary
        run: python -m PyInstaller --clean --onefile --name ssh-stats ssh_stats/__main__.py

      - name: Assemble release bundle
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          bundle="ssh-stats-${VERSION}-${ARCH}"
          mkdir -p "release/${bundle}"
          install -m 0755 "dist/ssh-stats" "release/${bundle}/ssh-stats"
          install -m 0644 "contrib/ssh_stats.service" "release/${bundle}/ssh_stats.service"
          install -m 0644 "contrib/ssh_stats.env.example" "release/${bundle}/ssh_stats.env.example"
          install -m 0644 "contrib/grafana-dashboard.json" "release/${bundle}/grafana-dashboard.json"
          install -m 0644 "README.md" "release/${bundle}/README.md"
          install -m 0644 "LICENSE" "release/${bundle}/LICENSE"
          install -m 0644 "CHANGELOG.md" "release/${bundle}/CHANGELOG.md"
          tar -C release -czf "dist/${bundle}.tar.gz" "${bundle}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: dist/ssh-stats-${{ github.ref_name }}-${{ matrix.arch }}.tar.gz

  build-python-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*

  publish-release:
    needs: [build-binary, build-python-package]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          find . -type f -maxdepth 2 -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/binary-linux-amd64/*
            release-artifacts/binary-linux-arm64/*
            release-artifacts/python-packages/*
            release-artifacts/SHA256SUMS.txt
